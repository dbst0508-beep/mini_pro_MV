{% extends "base.html" %}

{% block title %}게시물{% endblock %}

{% block content %}
<h1>게시물</h1>
{% if posts %}
    <ul>
        {% for post in posts %}
        <li>
            <img src="{{ post.image.url }}" alt="{{ post.caption }}" width="200">
            <p>{{ post.user }} - {{ post.caption }}</p>
        </li>
        {% endfor %}
    </ul>
{% else %}
    <p>게시물이 없습니다.</p>
{% endif %}
{% endblock %}
